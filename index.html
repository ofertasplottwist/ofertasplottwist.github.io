<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ofertas Plottwist - As Melhores Promoções</title>
  <meta name="description" content="As melhores promoções 100% gratuito. Só produtos originais e lojas confiáveis!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #151921;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 448px;
      width: 100%;
    }

    .avatar-wrapper {
      position: relative;
      margin-bottom: 24px;
    }

    .avatar {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid #22c55e;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .online-indicator {
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      background-color: #22c55e;
      border-radius: 50%;
      border: 4px solid #151921;
    }

    .title {
      color: white;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #9ca3af;
      font-size: 18px;
      margin-bottom: 4px;
    }

    .subtitle strong {
      font-weight: 700;
    }

    .free-text {
      color: #22c55e;
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 16px;
    }

    .members-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background-color: #2a2f3a;
      border-radius: 9999px;
      padding: 8px 16px;
      margin-bottom: 24px;
    }

    .members-dot {
      width: 12px;
      height: 12px;
      background-color: #22c55e;
      border-radius: 50%;
    }

    .members-text {
      color: white;
      font-size: 14px;
    }

    .btn {
      width: 100%;
      max-width: 384px;
      border-radius: 9999px;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-decoration: none;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
    }

    .btn-whatsapp {
      background-color: #25D366;
      margin-bottom: 16px;
      box-shadow: 0 0 20px rgba(37, 211, 102, 0.4);
      animation: pulse-subtle 2s ease-in-out infinite;
    }

    .btn-whatsapp:hover {
      background-color: #20bd5a;
    }

    .btn-telegram {
      background-color: #2AABEE;
      margin-bottom: 24px;
    }

    .btn-telegram:hover {
      background-color: #229ed9;
    }

    .btn-text {
      color: white;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.05em;
    }

    .btn-icon {
      width: 24px;
      height: 24px;
      fill: white;
    }

    .trust-text {
      color: #6b7280;
      font-size: 14px;
    }

    @keyframes pulse-subtle {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 20px rgba(37, 211, 102, 0.4);
      }
      50% {
        transform: scale(1.02);
        box-shadow: 0 0 25px rgba(37, 211, 102, 0.6);
      }
    }
  </style>
</head>
