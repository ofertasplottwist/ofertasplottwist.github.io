<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ofertas Plottwist</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Share+Tech+Mono&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-dark: #0d0520;
    --bg-card: rgba(30, 10, 70, 0.85);
    --neon-cyan: #00e5ff;
    --neon-pink: #ff2d78;
    --neon-green: #00e676;
    --gold: #ffd600;
    --gold-dark: #f9a825;
    --text-white: #ffffff;
    --card-border: rgba(0, 229, 255, 0.35);
    --shadow-glow: 0 0 30px rgba(0, 229, 255, 0.25);
  }

  html {
    background-color: #0d0520;
  }

  body {
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, #3a0060 0%, transparent 55%),
      radial-gradient(ellipse 70% 50% at 80% 85%, #001a5e 0%, transparent 55%),
      #0d0520;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* Subtle animated glow overlays */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 15% 85%, rgba(0,229,255,0.07) 0%, transparent 35%),
      radial-gradient(circle at 85% 15%, rgba(255,45,120,0.07) 0%, transparent 35%);
    pointer-events: none;
    z-index: 0;
    animation: bgPulse 6s ease-in-out infinite alternate;
  }

  @keyframes bgPulse {
    from { opacity: 0.5; }
    to   { opacity: 1; }
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
  }

  /* ─── CARD ─── */
  .card {
    background: var(--bg-card);
    border: 1.5px solid var(--card-border);
    border-radius: 24px;
    padding: 36px 28px 32px;
    box-shadow: var(--shadow-glow), 0 8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  /* ─── LOGO ─── */
  .logo-img {
    width: clamp(260px, 85%, 320px);
    height: auto;
    display: block;
    margin: 0 auto;
    animation: logoFloat 3s ease-in-out infinite;
    user-select: none;
    
    filter: drop-shadow(0 0 18px rgba(255, 214, 0, 0.5))
            drop-shadow(0 4px 8px rgba(0,0,0,0.6));
  }

  @keyframes logoFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
  }

  /* ─── HEADLINE ─── */
  .headline {
    text-align: center;
    color: var(--text-white);
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(18px, 5.5vw, 22px);
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    line-height: 1.3;
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
  }

  .subheadline {
    text-align: center;
    color: rgba(255,255,255,0.75);
    font-style: italic;
    font-size: clamp(13px, 3.5vw, 15px);
    margin-top: -14px;
  }

  /* ─── COUNTDOWN BOX ─── */
  .countdown-box {
    width: 100%;
    background: rgba(0, 0, 0, 0.55);
    border: 1.5px solid rgba(0, 229, 255, 0.4);
    border-radius: 14px;
    padding: 18px 16px;
    text-align: center;
    box-shadow: inset 0 0 20px rgba(0, 229, 255, 0.06), 0 0 18px rgba(0,229,255,0.15);
  }

  .countdown-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(10px, 2.5vw, 12px);
    letter-spacing: 2px;
    color: rgba(255,255,255,0.65);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .countdown-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(52px, 16vw, 72px);
    font-weight: 700;
    color: var(--neon-cyan);
    letter-spacing: 6px;
    text-shadow:
      0 0 10px var(--neon-cyan),
      0 0 30px rgba(0, 229, 255, 0.6),
      0 0 60px rgba(0, 229, 255, 0.25);
    line-height: 1;
    transition: all 0.3s ease;
  }

  .countdown-display.encerrado {
    font-size: clamp(28px, 9vw, 38px);
    color: var(--neon-pink);
    letter-spacing: 4px;
    text-shadow:
      0 0 10px var(--neon-pink),
      0 0 30px rgba(255, 45, 120, 0.6);
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 50% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ─── VAGAS ─── */
  .vagas-section {
    width: 100%;
  }

  .vagas-label {
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(12px, 3.5vw, 14px);
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--text-white);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .vagas-label span {
    color: var(--neon-pink);
    font-size: 1.15em;
    text-shadow: 0 0 8px var(--neon-pink);
    transition: all 0.4s ease;
  }

  .vagas-label span.flash {
    animation: flashNum 0.5s ease;
  }

  @keyframes flashNum {
    0% { transform: scale(1.4); color: #fff; }
    100% { transform: scale(1); color: var(--neon-pink); }
  }

  /* Progress bar */
  .progress-track {
    width: 100%;
    height: 26px;
    background: rgba(0,0,0,0.4);
    border-radius: 50px;
    overflow: hidden;
    position: relative;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .progress-fill {
    height: 100%;
    border-radius: 50px;
    background: linear-gradient(90deg, var(--neon-pink) 0%, #8a2be2 50%, var(--neon-cyan) 100%);
    transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    position: relative;
    box-shadow: 0 0 12px rgba(255,45,120,0.5);
  }

  .progress-fill::after {
    content: attr(data-pct) '%';
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    white-space: nowrap;
  }

  /* ─── BUTTONS ─── */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 0 20px;
    min-height: 62px;
    height: 62px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: clamp(15px, 4vw, 17px);
    font-weight: 900;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--text-white);
    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.15s ease;
  }

  .btn:hover::before { background: rgba(255,255,255,0.08); }
  .btn:active { transform: scale(0.97); }

  .btn-whatsapp {
    background: linear-gradient(135deg, #00e676 0%, #00c853 100%);
    box-shadow: 0 6px 24px rgba(0, 230, 118, 0.45), 0 2px 8px rgba(0,0,0,0.3);
  }
  .btn-whatsapp:hover { box-shadow: 0 8px 32px rgba(0, 230, 118, 0.65), 0 2px 8px rgba(0,0,0,0.3); transform: translateY(-2px); }

  .btn-telegram {
    background: linear-gradient(135deg, #29b6f6 0%, #0288d1 100%);
    box-shadow: 0 6px 24px rgba(41, 182, 246, 0.4), 0 2px 8px rgba(0,0,0,0.3);
  }
  .btn-telegram:hover { box-shadow: 0 8px 32px rgba(41, 182, 246, 0.6), 0 2px 8px rgba(0,0,0,0.3); transform: translateY(-2px); }

  .btn-icon {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }

  /* ─── DESKTOP: lock to mobile width ─── */
  @media (min-width: 600px) {
    body {
      min-height: 100vh;
    }
    .wrapper {
      max-width: 390px;
    }
    .card {
      padding: 40px 32px 36px;
    }
  }
</style>
</head>

      display.classList.add('encerrado');
      clearInterval(countdownInterval);
      return;
    }
    const m = Math.floor(totalSeconds / 60);
    const s = totalSeconds % 60;
    display.textContent = pad(m) + ':' + pad(s);

    // Flash red when under 30s
    if (totalSeconds <= 30) {
      display.style.color = '#ff4d4d';
      display.style.textShadow = '0 0 10px #ff4d4d, 0 0 30px rgba(255,77,77,0.6)';
    }
    totalSeconds--;
  }

  updateCountdown();
  const countdownInterval = setInterval(updateCountdown, 1000);

  // ─── VAGAS + PROGRESS BAR ─────────────────────────────────────
  let vagas = 177;
  const TOTAL_VAGAS = 1000; // fictional total for % calc
  const vagasEl = document.getElementById('vagas-num');
  const bar = document.getElementById('progress-bar');

  function getPct() {
    // percentage of vagas TAKEN = (TOTAL - vagas) / TOTAL
    const taken = TOTAL_VAGAS - vagas;
    const pct = Math.round((taken / TOTAL_VAGAS) * 100);
    return Math.max(0, Math.min(100, pct));
  }

  function updateVagas() {
    const decrement = Math.floor(Math.random() * 3) + 1; // 1–3
    vagas = Math.max(0, vagas - decrement);

    vagasEl.textContent = vagas;
    // trigger flash
    vagasEl.classList.remove('flash');
    void vagasEl.offsetWidth; // reflow
    vagasEl.classList.add('flash');

    const pct = getPct();
    bar.style.width = pct + '%';
    bar.setAttribute('data-pct', pct);
  }

  // Initial bar state
  const initPct = getPct();
  bar.style.width = initPct + '%';
  bar.setAttribute('data-pct', initPct);

  setInterval(updateVagas, 15000);
</script>
</body>
</html>
